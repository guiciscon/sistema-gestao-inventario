version: "3.8"

services:
  db:
    image: postgres:15
    container_name: sistema_gestao_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sistema_gestao_inventario
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/data/postgres

volumes:
  pgdata:
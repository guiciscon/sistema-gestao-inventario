services:
  db:
    image: postgres:15
    container_name: sistema_gestao_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sistema_gestao_inventario
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: sistema_gestao_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sistema_gestao_inventario
    depends_on:
      - db
    command: sh -c "npx prisma db push && npx prisma db seed && npm run dev"

  frontend:
    build: ./frontend/vite-project
    container_name: sistema_gestao_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata: